<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoPlay - YouTube Music Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">Echo<span>Play</span></div>
    <p>Search YouTube music, view thumbnails, and play instantly.</p>
  </header>

  <main>
    <section class="hero">
      <h1>Discover & Play Music</h1>
      <p>Search songs directly from YouTube and play them in a clean player.</p>

      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search song, artist, remix..." />
        <button onclick="searchSongs()">Search</button>
      </div>
    </section>

    <section class="player-section">
      <iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </section>

    <h2 class="result-title">Search Results</h2>
    <section id="results" class="results"></section>
  </main>

  <footer>
    <p>Powered by YouTube • EchoPlay</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
