<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MakeTune</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <header class="topbar">
    <h1>MakeTune</h1>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </header>

  <main>
    <section id="homePage" class="page active">
      <h2>Quick picks</h2>
      <div id="quickPicks" class="song-list"></div>

      <h2>Popular Mixes</h2>
      <div class="mix-grid">
        <button onclick="quickSearch('lofi songs')">Lofi Mix</button>
        <button onclick="quickSearch('arijit singh songs')">Arijit Hits</button>
        <button onclick="quickSearch('bollywood romantic songs')">Romantic</button>
        <button onclick="quickSearch('party songs')">Party</button>
      </div>
    </section>

    <section id="searchPage" class="page">
      <div class="search-box">
        <input id="searchInput" placeholder="Search song..." autocomplete="off" />
      </div>

      <h2>Moods & moments</h2>
      <div class="mood-grid">
        <button onclick="quickSearch('chill songs')">Chill</button>
        <button onclick="quickSearch('commute songs')">Commute</button>
        <button onclick="quickSearch('workout songs')">Workout</button>
        <button onclick="quickSearch('sad songs')">Sad</button>
        <button onclick="quickSearch('romantic songs')">Romance</button>
        <button onclick="quickSearch('sleep music')">Sleep</button>
      </div>

      <h2>Search Results</h2>
      <div id="searchResults" class="song-list"></div>
    </section>

    <section id="libraryPage" class="page">
      <h2>Library</h2>

      <div class="library-grid">
        <div onclick="openLibrarySection('liked')">♡<span>Liked</span></div>
        <div onclick="openLibrarySection('downloaded')">↓<span>Downloaded</span></div>
        <div onclick="openLibrarySection('top')">↗<span>My top 50</span></div>
        <div onclick="openLibrarySection('history')">↻<span>History</span></div>
      </div>

      <div class="library-head">
        <h2 id="libraryTitle">Recently Played</h2>
        <button id="clearHistoryBtn" onclick="clearHistory()">Clear History</button>
      </div>

      <div id="libraryList" class="song-list"></div>
    </section>
  </main>

  <div class="mini-player" onclick="openFullPlayer()">
    <img id="miniCover" src="https://i.ytimg.com/vi/jfKfPfyJRdk/hqdefault.jpg">
    <div class="mini-info">
      <h3 id="miniTitle">Search and play a song</h3>
      <p id="miniChannel">MakeTune</p>
    </div>
    <button id="miniPlayBtn" onclick="event.stopPropagation(); togglePlay()">▶</button>
  </div>

  <nav class="bottom-nav">
    <button onclick="showPage('homePage', this)" class="active">⌂<span>Home</span></button>
    <button onclick="showPage('searchPage', this)">⌕<span>Search</span></button>
    <button onclick="showPage('libraryPage', this)">▥<span>Library</span></button>
  </nav>
</div>

<section id="fullPlayer" class="full-player">
  <button class="close-btn" onclick="closeFullPlayer()">⌄</button>

  <img id="bigCover" class="big-cover" src="https://i.ytimg.com/vi/jfKfPfyJRdk/hqdefault.jpg">

  <div class="full-info">
    <h2 id="bigTitle">Search and play a song</h2>
    <p id="bigChannel">MakeTune</p>
    <button id="likeBtn" class="like-btn" onclick="toggleLike()">♡</button>
  </div>

  <div class="timeline" id="timeline">
    <div id="progressFill"></div>
  </div>

  <div class="time-row">
    <span id="currentTime">0:00</span>
    <span id="durationTime">0:00</span>
  </div>

  <div class="player-controls">
    <button onclick="seekBy(-10)" class="icon-btn">⏪</button>
    <button id="mainPlayBtn" class="main-play" onclick="togglePlay()">▶</button>
    <button onclick="seekBy(10)" class="icon-btn">⏩</button>
  </div>
</section>

<section id="settingsPage" class="settings-page">
  <button class="close-btn" onclick="closeSettings()">⌄</button>
  <h2>Settings</h2>

  <div class="setting-card">
    <h3>Appearance</h3>
    <button onclick="setTheme('dark')">Dark Theme</button>
    <button onclick="setTheme('light')">Light Theme</button>
  </div>

  <div class="setting-card">
    <h3>Playback Sensitivity</h3>
    <input type="range" min="1" max="10" value="5">
  </div>

  <div class="setting-card">
    <h3>Login</h3>
    <input id="loginName" placeholder="Enter your name">
    <button onclick="saveLogin()">Save Login</button>
    <p id="loginStatus">Not logged in</p>
  </div>
</section>

<div id="ytPlayer"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
</body>
</html>
