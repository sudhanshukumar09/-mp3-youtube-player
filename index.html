<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FabTune – MP3 Music Player</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app-container">
  <div class="app-header">
    <div class="logo">FabTune <span>✦ MP3</span></div>
    <div class="chip-row" id="trendingChips">
      <div class="chip" data-cat="Bollywood Romantic Memoirs">💞 Romantic Memoirs</div>
      <div class="chip" data-cat="Boi Bollywood Sangest">🎤 Boi Bollywood</div>
      <div class="chip" data-cat="10 Bollywood Dhan">🏆 10 Bollywood Dhan</div>
      <div class="chip" data-cat="Punjabi Hits">🪘 Punjabi Fire</div>
    </div>
  </div>

  <!-- HOME VIEW -->
  <div id="homeView" class="view active">
    <div class="section-title"><i class="fas fa-bolt"></i> Quick picks</div>
    <div class="quick-grid" id="quickPicksGrid"></div>
    <div class="section-title"><i class="fas fa-music"></i> Band Baaja Baraat ✨</div>
    <div class="chip-row" id="moodChips">
      <div class="chip" data-mood="Shadi Special">🎵 Shaadi Season</div>
      <div class="chip" data-mood="Sangeet Night">💃 Sangeet</div>
      <div class="chip" data-mood="Punjab Fire">🔥 Punjab Fire</div>
      <div class="chip" data-mood="Feel Good">😊 Feel Good</div>
    </div>
  </div>

  <!-- SEARCH VIEW -->
  <div id="searchView" class="view">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search songs, artists...">
    </div>
    <div id="suggestionsContainer" class="suggestions-list" style="display: none;"></div>
    <div class="section-title" style="margin-top: 0;"><i class="fas fa-list-ul"></i> Results</div>
    <div id="searchResults" class="result-grid"></div>
  </div>

  <!-- LIBRARY VIEW -->
  <div id="libraryView" class="view">
    <div class="lib-tabs">
      <div class="lib-tab active" data-tab="liked">❤️ Liked Songs</div>
      <div class="lib-tab" data-tab="playlists">📀 Playlists</div>
    </div>
    <div id="likedContainer"></div>
    <div id="playlistsContainer" style="display: none;"></div>
  </div>

  <!-- BOTTOM PLAYER BAR (MINI PLAYER) -->
  <div class="player-bar" id="playerBar">
    <div class="player-info">
      <img id="playerThumb" class="player-img" src="https://via.placeholder.com/48?text=♫" alt="cover">
      <div class="player-meta">
        <h4 id="playerTitle">Select a song</h4>
        <p id="playerArtist">FabTune player</p>
      </div>
      <div class="player-controls">
        <i class="fas fa-backward-step" id="prevBtn"></i>
        <i class="fas fa-play-circle" id="playPauseBtn" style="font-size: 2rem;"></i>
        <i class="fas fa-forward-step" id="nextBtn"></i>
      </div>
    </div>
    <div class="progress-area">
      <span id="currentTime">0:00</span>
      <div class="seek-bar" id="seekBar">
        <div class="seek-fill" id="seekFill"></div>
      </div>
      <span id="durationTime">0:00</span>
    </div>
    <div class="volume-box">
      <i class="fas fa-volume-up" id="volumeIcon"></i>
      <input type="range" id="volumeSlider" min="0" max="100" value="70">
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <div class="nav-item active" data-nav="home"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" data-nav="search"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" data-nav="library"><i class="fas fa-layer-group"></i><span>Library</span></div>
  </div>
</div>

<!-- Hidden YouTube Player (audio only) -->
<div id="youtubePlayerContainer" class="hidden-player"></div>

<script src="script.js"></script>
</body>
</html>
